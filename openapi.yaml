openapi: 3.0.3

info:
  title: Meeting Bot API
  description: >
    REST API for the Meetings Editor Telegram Mini App.
    Provides person lookup, meeting creation, and .docx export.
  version: 1.0.0

servers:
  - url: http://localhost:8080
    description: Local development

tags:
  - name: people
    description: Person management
  - name: meetings
    description: Meeting management and export

paths:
  /people:
    get:
      tags:
        - people
      summary: List or search people
      description: >
        Without `q`: returns all people ordered by last_name, first_name.

        With `q`: performs a word-by-word partial match search. The query is split
        on whitespace into words; every word must appear somewhere in the
        concatenated name string (case-insensitive). Backed by a PostgreSQL GIN
        trigram index (pg_trgm) — efficient up to ~100k rows. Returns up to 100
        results.
      parameters:
        - name: q
          in: query
          required: false
          description: >
            Optional search string. Split on whitespace; each word is matched
            as a substring of the full name. Example: "иван пет" matches
            "Иван Петров".
          schema:
            type: string
          example: Иванов Иван
      responses:
        '200':
          description: List of people (all, or matching q)
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Person'
              example:
                - id: 42
                  last_name: Иванов
                  first_name: Иван
                  middle_name: Иванович
                  info: Руководитель отдела
                - id: 43
                  last_name: Петров
                  first_name: Пётр
                  middle_name: null
                  info: null

    post:
      tags:
        - people
      summary: Create a new person
      description: >
        Adds a new person to the database.
        Returns 409 Conflict if a person with the same last_name,
        first_name, and middle_name already exists.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PersonCreate'
            example:
              last_name: Сидоров
              first_name: Алексей
              middle_name: Петрович
              info: Главный аналитик
      responses:
        '201':
          description: Person created successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Person'
              example:
                id: 99
                last_name: Сидоров
                first_name: Алексей
                middle_name: Петрович
                info: Главный аналитик
        '409':
          description: Person with this name already exists
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorConflict'
              example:
                message: Person already exists
                details:
                  existing_id: 55

  /people/{id}:
    get:
      tags:
        - people
      summary: Get a person by ID
      description: Returns the full person record for the given ID.
      parameters:
        - name: id
          in: path
          required: true
          description: Person ID
          schema:
            type: integer
          example: 42
      responses:
        '200':
          description: Person found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Person'
        '404':
          description: Person not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorNotFound'

    patch:
      tags:
        - people
      summary: Update a person (partial)
      description: >
        Partially updates an existing person's fields. Only the fields present
        in the request body are updated; omitted fields remain unchanged.
        Returns 409 if the new name combination already belongs to a different person.
      parameters:
        - name: id
          in: path
          required: true
          description: Person ID to update
          schema:
            type: integer
          example: 42
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PersonCreate'
            example:
              last_name: Иванов
              first_name: Иван
              middle_name: Иванович
              info: Директор департамента
      responses:
        '200':
          description: Person updated successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Person'
        '404':
          description: Person not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorNotFound'
        '409':
          description: Another person with the same name already exists
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorConflict'

    delete:
      tags:
        - people
      summary: Delete a person
      description: >
        Permanently removes a person from the database.
        Returns 409 if the person is referenced in one or more existing meetings
        (FK constraint prevents deletion).
      parameters:
        - name: id
          in: path
          required: true
          description: Person ID to delete
          schema:
            type: integer
          example: 42
      responses:
        '204':
          description: Person deleted successfully
        '404':
          description: Person not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorNotFound'
        '409':
          description: Person is referenced in existing meetings and cannot be deleted
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorConflict'
              example:
                message: Person is referenced in existing meetings

  /meetings:
    get:
      tags:
        - meetings
      summary: Get all meetings
      description: >
        Returns a paginated list of all meetings from the database,
        ordered by date descending (newest first).
      parameters:
        - name: limit
          in: query
          required: false
          description: Maximum number of meetings to return (default 20, max 100)
          schema:
            type: integer
            minimum: 1
            maximum: 100
            default: 20
          example: 20
        - name: offset
          in: query
          required: false
          description: Number of meetings to skip for pagination
          schema:
            type: integer
            minimum: 0
            default: 0
          example: 0
      responses:
        '200':
          description: List of meetings
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MeetingList'
              example:
                total: 42
                limit: 20
                offset: 0
                items:
                  - id: 3fa85f64-5717-4562-b3fc-2c963f66afa6
                    title: совещания по вопросам поддержки применения ИИ в науке
                    date: '2026-02-26T11:00:00Z'
                    chairperson:
                      id: 42
                      last_name: Иванов
                      first_name: Иван
                      middle_name: Иванович
                      info: Заместитель руководителя Секретариата
                    created_at: '2026-02-26T10:00:00Z'

    post:
      tags:
        - meetings
      summary: Create a meeting
      description: >
        Creates a new meeting with only a title and date. The meeting starts in
        "incomplete" status — add people, set a chairperson, and add agenda items
        via dedicated endpoints before exporting.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/MeetingCreate'
            example:
              title: совещания по вопросам поддержки применения ИИ в науке
              date: '2026-02-26T11:00:00Z'
      responses:
        '201':
          description: Meeting created successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Meeting'
              example:
                id: 3fa85f64-5717-4562-b3fc-2c963f66afa6
                title: совещания по вопросам поддержки применения ИИ в науке
                date: '2026-02-26T11:00:00Z'
                chairperson: null
                agenda_items: []
                people: []
                status: incomplete
                created_at: '2026-02-26T10:00:00Z'

  /meetings/{id}:
    get:
      tags:
        - meetings
      summary: Get meeting by ID
      description: >
        Returns the full meeting record for the specified UUID,
        including resolved chairperson, agenda items with speakers,
        and the complete people list.
      parameters:
        - name: id
          in: path
          required: true
          description: UUID of the meeting
          schema:
            type: string
            format: uuid
          example: 3fa85f64-5717-4562-b3fc-2c963f66afa6
      responses:
        '200':
          description: Meeting found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Meeting'
              example:
                id: 3fa85f64-5717-4562-b3fc-2c963f66afa6
                title: совещания по вопросам поддержки применения ИИ в науке
                date: '2026-02-26T11:00:00Z'
                chairperson:
                  id: 42
                  last_name: Иванов
                  first_name: Иван
                  middle_name: Иванович
                  info: Заместитель руководителя Секретариата
                agenda_items:
                  - text: Вступительное слово
                    speaker:
                      id: 42
                      last_name: Иванов
                      first_name: Иван
                      middle_name: Иванович
                      info: Заместитель руководителя Секретариата
                people:
                  - id: 42
                    last_name: Иванов
                    first_name: Иван
                    middle_name: Иванович
                    info: Заместитель руководителя Секретариата
                  - id: 17
                    last_name: Петрова
                    first_name: Мария
                    middle_name: Сергеевна
                    info: Ведущий инженер
                status: complete
                created_at: '2026-02-26T10:00:00Z'
        '404':
          description: Meeting not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorNotFound'

    patch:
      tags:
        - meetings
      summary: Update meeting title and/or date (partial)
      description: >
        Partially updates the title and/or date of an existing meeting.
        Only fields present in the request body are updated.
        To set or change the chairperson use PUT /meetings/{id}/chairperson.
        Returns the full updated Meeting object.
      parameters:
        - name: id
          in: path
          required: true
          description: UUID of the meeting
          schema:
            type: string
            format: uuid
          example: 3fa85f64-5717-4562-b3fc-2c963f66afa6
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/MeetingUpdate'
            example:
              title: обновлённое название совещания
              date: '2026-03-01T10:00:00Z'
      responses:
        '200':
          description: Meeting updated successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Meeting'
        '404':
          description: Meeting not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorNotFound'

    delete:
      tags:
        - meetings
      summary: Delete a meeting
      description: >
        Permanently deletes the meeting and all associated agenda items and
        meeting_participants records (cascade). This action is irreversible.
      parameters:
        - name: id
          in: path
          required: true
          description: UUID of the meeting to delete
          schema:
            type: string
            format: uuid
          example: 3fa85f64-5717-4562-b3fc-2c963f66afa6
      responses:
        '204':
          description: Meeting deleted successfully
        '404':
          description: Meeting not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorNotFound'

  /meetings/{id}/meta:
    get:
      tags:
        - meetings
      summary: Get meeting metadata (no lists)
      description: >
        Returns meeting metadata only — id, title, date, chairperson, status,
        and created_at. Does not include people or agenda_items.
        Useful when the client only needs header information without fetching
        the full meeting payload.
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
          example: 3fa85f64-5717-4562-b3fc-2c963f66afa6
      responses:
        '200':
          description: Meeting metadata
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MeetingSummary'
        '404':
          description: Meeting not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorNotFound'

  /meetings/{id}/people:
    get:
      tags:
        - meetings
      summary: Get meeting people list
      description: >
        Returns the ordered list of people currently registered for this
        meeting. Order matches the display order set via
        PUT /meetings/{id}/people/order.
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
          example: 3fa85f64-5717-4562-b3fc-2c963f66afa6
      responses:
        '200':
          description: Ordered list of people in the meeting
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Person'
        '404':
          description: Meeting not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorNotFound'
    post:
      tags:
    put:
      tags:
        - meetings
      summary: Set or replace the chairperson
      description: >
        Sets (or replaces) the chairperson for the specified meeting.
        The person must already be in the meeting's people list.
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
          example: 3fa85f64-5717-4562-b3fc-2c963f66afa6
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SetChairperson'
      responses:
        '200':
          description: Chairperson set successfully — returns the updated meeting
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Meeting'
        '400':
          description: Missing or invalid body
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorBadRequest'
        '404':
          description: Meeting not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorNotFound'
        '422':
          description: Person is not in the meeting's people list
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorUnprocessableEntity'
              example:
                message: chairperson must be a person in this meeting

    post:
      tags:
        - meetings
      summary: Add a person to an existing meeting
      description: >
        Adds an existing person (by ID) to the specified meeting's people list.
        The person is appended to the end of the list.
        Returns 409 if the person is already in the meeting.
        Returns 422 if the person ID does not exist in the database.
        Returns the full updated Meeting object.
      parameters:
        - name: id
          in: path
          required: true
          description: UUID of the meeting
          schema:
            type: string
            format: uuid
          example: 3fa85f64-5717-4562-b3fc-2c963f66afa6
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AddMeetingPerson'
            example:
              person_id: 55
      responses:
        '200':
          description: Person added; returns updated meeting
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Meeting'
        '404':
          description: Meeting not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorNotFound'
        '409':
          description: Person is already in this meeting
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorConflict'
              example:
                message: person already in meeting
        '422':
          description: Person ID does not exist in the database
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error422'
              example:
                message: person not found

  /meetings/{id}/people/{pid}:
    delete:
      tags:
        - meetings
      summary: Remove a person from a meeting
      description: >
        Removes a person from the specified meeting's people list.
        Returns 409 if the person is the meeting's chairperson (change
        chairperson first via PUT /meetings/{id}/chairperson) or if the person is
        a speaker on any agenda item of this meeting (remove or reassign the
        agenda item first).
        Returns the full updated Meeting object on success.
      parameters:
        - name: id
          in: path
          required: true
          description: UUID of the meeting
          schema:
            type: string
            format: uuid
          example: 3fa85f64-5717-4562-b3fc-2c963f66afa6
        - name: pid
          in: path
          required: true
          description: Person ID to remove from the meeting
          schema:
            type: integer
          example: 55
      responses:
        '200':
          description: Person removed; returns updated meeting
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Meeting'
        '404':
          description: Meeting or person not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorNotFound'
        '409':
          description: >
            Cannot remove person — they are the chairperson or a speaker
            on an agenda item.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorConflict'
              example:
                message: cannot remove chairperson from meeting

  /meetings/{id}/people/order:
    put:
      tags:
        - meetings
      summary: Reorder people within a meeting
      description: >
        Replaces the display order of people for the specified meeting.
        The request body must contain exactly the same set of person IDs
        already attached to the meeting — only their order changes.
        The new order is persisted and reflected in subsequent GET /meetings/{id}
        responses and in the Список участников export.
        Returns 422 if the provided IDs do not exactly match the meeting's
        current people set (wrong count or unknown ID).
      parameters:
        - name: id
          in: path
          required: true
          description: UUID of the meeting
          schema:
            type: string
            format: uuid
          example: 3fa85f64-5717-4562-b3fc-2c963f66afa6
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PersonOrder'
            example:
              person_ids:
                - 17
                - 42
      responses:
        '204':
          description: Order updated successfully
        '404':
          description: Meeting not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorNotFound'
        '422':
          description: >
            Provided person_ids do not exactly match the meeting's
            current people (wrong count or unknown ID).
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error422'
              example:
                message: person IDs must exactly match the meeting's current people

  /meetings/{id}/agenda-items:
    get:
      tags:
        - meetings
      summary: Get meeting agenda items
      description: >
        Returns the ordered list of agenda items for this meeting, each
        including the resolved speaker. Order matches the display order set
        via PUT /meetings/{id}/agenda-items/order.
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
          example: 3fa85f64-5717-4562-b3fc-2c963f66afa6
      responses:
        '200':
          description: Ordered list of agenda items
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/AgendaItem'
        '404':
          description: Meeting not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorNotFound'
    post:
      tags:
        - meetings
      summary: Add an agenda item to an existing meeting
      description: >
        Appends a new agenda item to the meeting. All speaker_ids must
        already be people in this meeting (returns 422 otherwise).
        At least one speaker_id is required. Returns the full updated Meeting object.
      parameters:
        - name: id
          in: path
          required: true
          description: UUID of the meeting
          schema:
            type: string
            format: uuid
          example: 3fa85f64-5717-4562-b3fc-2c963f66afa6
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AgendaItemUpsert'
            example:
              text: Новый пункт повестки
              speaker_ids: [42]
      responses:
        '201':
          description: Agenda item added; returns updated meeting
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Meeting'
        '404':
          description: Meeting not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorNotFound'
        '422':
          description: One or more speaker_ids are not people in this meeting
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error422'
              example:
                message: speaker must be a person in this meeting

  /meetings/{id}/agenda-items/{item_id}:
    put:
      tags:
        - meetings
      summary: Update an agenda item
      description: >
        Replaces the text and speaker list of the specified agenda item.
        All speaker_ids must already be people in this meeting (returns 422 otherwise).
        Speakers are fully replaced — include all desired speakers in the request.
        Returns the full updated Meeting object.
      parameters:
        - name: id
          in: path
          required: true
          description: UUID of the meeting
          schema:
            type: string
            format: uuid
          example: 3fa85f64-5717-4562-b3fc-2c963f66afa6
        - name: item_id
          in: path
          required: true
          description: ID of the agenda item to update
          schema:
            type: integer
          example: 3
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AgendaItemUpsert'
            example:
              text: Обновлённый текст пункта
              speaker_ids: [17, 42]
      responses:
        '200':
          description: Agenda item updated; returns updated meeting
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Meeting'
        '404':
          description: Meeting or agenda item not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorNotFound'
        '422':
          description: One or more speaker_ids are not people in this meeting
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error422'
              example:
                message: speaker must be a person in this meeting

    delete:
      tags:
        - meetings
      summary: Delete an agenda item
      description: >
        Removes the specified agenda item from the meeting.
        Returns the full updated Meeting object.
      parameters:
        - name: id
          in: path
          required: true
          description: UUID of the meeting
          schema:
            type: string
            format: uuid
          example: 3fa85f64-5717-4562-b3fc-2c963f66afa6
        - name: item_id
          in: path
          required: true
          description: ID of the agenda item to delete
          schema:
            type: integer
          example: 3
      responses:
        '200':
          description: Agenda item deleted; returns updated meeting
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Meeting'
        '404':
          description: Meeting or agenda item not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorNotFound'

  /meetings/{id}/agenda-items/{item_id}/speakers:
    post:
      tags:
        - meetings
      summary: Add a speaker to an agenda item
      description: >
        Adds an existing person as a speaker on the specified agenda item.
        The person must already be in the meeting's people list.
        Returns 409 if the person is already a speaker on this item.
        Returns the full updated Meeting object.
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
          example: 3fa85f64-5717-4562-b3fc-2c963f66afa6
        - name: item_id
          in: path
          required: true
          schema:
            type: integer
          example: 3
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AddAgendaItemSpeaker'
            example:
              person_id: 17
      responses:
        '200':
          description: Speaker added; returns updated meeting
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Meeting'
        '404':
          description: Meeting or agenda item not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorNotFound'
        '409':
          description: Person is already a speaker on this agenda item
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorConflict'
              example:
                message: person is already a speaker on this agenda item
        '422':
          description: Person is not in the meeting's people list
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorUnprocessableEntity'
              example:
                message: speaker must be a person in this meeting

  /meetings/{id}/agenda-items/{item_id}/speakers/{pid}:
    delete:
      tags:
        - meetings
      summary: Remove a speaker from an agenda item
      description: >
        Removes the specified person from the speakers list of the agenda item.
        Returns 409 if this is the last speaker (at least one must remain).
        Returns the full updated Meeting object.
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
          example: 3fa85f64-5717-4562-b3fc-2c963f66afa6
        - name: item_id
          in: path
          required: true
          schema:
            type: integer
          example: 3
        - name: pid
          in: path
          required: true
          description: ID of the person to remove as a speaker
          schema:
            type: integer
          example: 17
      responses:
        '200':
          description: Speaker removed; returns updated meeting
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Meeting'
        '404':
          description: Meeting, agenda item, or speaker not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorNotFound'
        '409':
          description: Cannot remove — this is the last speaker on the item
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorConflict'
              example:
                message: agenda item must have at least one speaker — add another speaker before removing this one

  /meetings/{id}/agenda-items/order:
    put:
      tags:
        - meetings
      summary: Reorder agenda items within a meeting
      description: >
        Replaces the display order of agenda items for the specified meeting.
        The request body must contain exactly the same set of agenda item IDs
        already attached to the meeting — only their order changes.
        The new order is persisted and reflected in subsequent GET /meetings/{id}
        responses and in the Повестка export.
        Returns 422 if the provided IDs do not exactly match the meeting's
        current agenda items (wrong count or unknown ID).
      parameters:
        - name: id
          in: path
          required: true
          description: UUID of the meeting
          schema:
            type: string
            format: uuid
          example: 3fa85f64-5717-4562-b3fc-2c963f66afa6
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AgendaItemOrder'
            example:
              agenda_item_ids:
                - 3
                - 1
                - 2
      responses:
        '204':
          description: Order updated successfully
        '404':
          description: Meeting not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorNotFound'
        '422':
          description: >
            Provided agenda_item_ids do not exactly match the meeting's
            current agenda items (wrong count or unknown ID).
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error422'
              example:
                message: agenda item IDs must exactly match the meeting's current agenda items

  /meetings/{id}/export/agenda:
    get:
      tags:
        - meetings
      summary: Export meeting agenda as DOCX (Повестка)
      description: >
        Generates and returns a .docx "Повестка" document for the specified
        meeting. The document mirrors the official template layout:
        - Header block: "ПОВЕСТКА / [title]" centred, followed by the
          chairperson line and meeting date/time aligned right
        - Numbered agenda items (roman numerals I, II, III…), each followed
          by a "Докладчик:" label and a two-column table row containing the
          speaker's LAST NAME / First Name Patronymic in the left cell and
          their info/role in the right cell
      parameters:
        - name: id
          in: path
          required: true
          description: UUID of the meeting to export
          schema:
            type: string
            format: uuid
          example: 3fa85f64-5717-4562-b3fc-2c963f66afa6
      responses:
        '200':
          description: DOCX agenda file
          headers:
            Content-Disposition:
              description: >
                Attachment filename, e.g.
                attachment; filename="agenda-3fa85f64.docx"
              schema:
                type: string
          content:
            application/vnd.openxmlformats-officedocument.wordprocessingml.document:
              schema:
                type: string
                format: binary
        '404':
          description: Meeting not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorNotFound'
        '409':
          description: Meeting is incomplete (missing chairperson, people, or agenda items)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorConflict'
              example:
                message: meeting is incomplete — set chairperson, add people, and add agenda items before exporting

  /meetings/{id}/export/participants:
    get:
      tags:
        - meetings
      summary: Export participant list as DOCX (Список участников)
      description: >
        Generates and returns a .docx "Список участников" document for the
        specified meeting. The document mirrors the official template layout:
        - Header block: "СПИСОК / участников [title]" centred, followed by
          the chairperson line and meeting date/time aligned right
        - A single table with all participants in numbered rows; each row
          contains the sequential number, the participant's LAST NAME /
          First Name Patronymic, a dash separator, and their info/role
      parameters:
        - name: id
          in: path
          required: true
          description: UUID of the meeting to export
          schema:
            type: string
            format: uuid
          example: 3fa85f64-5717-4562-b3fc-2c963f66afa6
      responses:
        '200':
          description: DOCX participants list file
          headers:
            Content-Disposition:
              description: >
                Attachment filename, e.g.
                attachment; filename="participants-3fa85f64.docx"
              schema:
                type: string
          content:
            application/vnd.openxmlformats-officedocument.wordprocessingml.document:
              schema:
                type: string
                format: binary
        '404':
          description: Meeting not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorNotFound'
        '409':
          description: Meeting is incomplete (missing chairperson, people, or agenda items)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorConflict'
              example:
                message: meeting is incomplete — set chairperson, add people, and add agenda items before exporting

components:
  schemas:

    MeetingSummary:
      type: object
      description: >
        Lightweight meeting record returned in list responses.
        Contains only the fields needed for displaying a meeting in a list —
        full details (agenda_items, people) are fetched via GET /meetings/{id}.
      required:
        - id
        - title
        - date
        - created_at
      properties:
        id:
          type: string
          format: uuid
          example: 3fa85f64-5717-4562-b3fc-2c963f66afa6
        title:
          type: string
          example: совещания по вопросам поддержки применения ИИ в науке
        date:
          type: string
          format: date-time
          example: '2026-02-26T11:00:00Z'
        chairperson:
          description: Resolved chairperson object (null if not yet set)
          nullable: true
          allOf:
            - $ref: '#/components/schemas/Person'
        status:
          type: string
          enum: [incomplete, complete]
          description: >
            incomplete — chairperson not set, or no people, or no agenda items.
            complete — all three are present.
          example: incomplete
        created_at:
          type: string
          format: date-time
          example: '2026-02-26T10:00:00Z'

    MeetingList:
      type: object
      description: Paginated list of meetings.
      required:
        - total
        - limit
        - offset
        - items
      properties:
        total:
          type: integer
          description: Total number of meetings in the database (for pagination)
          example: 42
        limit:
          type: integer
          example: 20
        offset:
          type: integer
          example: 0
        items:
          type: array
          items:
            $ref: '#/components/schemas/MeetingSummary'

    Person:
      type: object
      description: A person in the database who can be added to meetings.
      required:
        - id
        - last_name
        - first_name
      properties:
        id:
          type: integer
          description: Unique person identifier
          example: 42
        last_name:
          type: string
          description: Last name (фамилия) — displayed in CAPS in documents
          example: Иванов
        first_name:
          type: string
          description: First name (имя)
          example: Иван
        middle_name:
          type: string
          description: Middle name / patronymic (отчество), optional
          example: Иванович
        info:
          type: string
          description: >
            Role/position displayed in exported documents
            (right column in Повестка and Список участников)
          example: Руководитель отдела

    PersonCreate:
      type: object
      description: Payload for creating or updating a person.
      required:
        - last_name
        - first_name
      properties:
        last_name:
          type: string
          description: Last name (фамилия)
          example: Сидоров
        first_name:
          type: string
          description: First name (имя)
          example: Алексей
        middle_name:
          type: string
          description: Middle name / patronymic (отчество), optional
          example: Петрович
        info:
          type: string
          description: Role/position info
          example: Главный аналитик

    AgendaItemCreate:
      type: object
      description: >
        Payload for creating or fully replacing an agenda item.
        At least one speaker ID is required; all speakers must already be
        in the meeting's people list.
      required:
        - text
        - speaker_ids
      properties:
        text:
          type: string
          description: >
            Topic/title of the agenda item as it will appear
            in the Повестка document
          example: Об институте AIRI и видении применения ИИ в науке
        speaker_ids:
          type: array
          items:
            type: integer
          minItems: 1
          description: >
            IDs of the people presenting this item (докладчики).
            All IDs must already be in the meeting's people list.
          example: [17, 42]

    AgendaItem:
      type: object
      description: >
        An agenda item with its speakers fully resolved.
        The id field is used when reordering via PUT /meetings/{id}/agenda-items/order.
      required:
        - id
        - text
        - speakers
      properties:
        id:
          type: integer
          description: Unique agenda item identifier
          example: 1
        text:
          type: string
          example: Об институте AIRI и видении применения ИИ в науке
        speakers:
          type: array
          items:
            $ref: '#/components/schemas/Person'
          description: Ordered list of speakers for this agenda item (at least one)

    AddAgendaItemSpeaker:
      type: object
      description: Payload for adding a speaker to an existing agenda item.
      required:
        - person_id
      properties:
        person_id:
          type: integer
          description: >
            ID of the person to add as a speaker.
            Must already be in the meeting's people list.
          example: 17

    MeetingCreate:
      type: object
      description: >
        Payload for creating a new meeting. Only title and date are required.
        The meeting is created with status "incomplete" — add people, set a
        chairperson, and add agenda items via dedicated endpoints.
      required:
        - title
        - date
      properties:
        title:
          type: string
          description: >
            Meeting topic, placed after "ПОВЕСТКА / СПИСОК участников"
            in the document header
          example: совещания по вопросам поддержки применения ИИ в науке
        date:
          type: string
          format: date-time
          description: >
            Date and time of the meeting (UTC, ISO 8601).
            Rendered as a localised date/time string in document headers.
          example: '2026-02-26T11:00:00Z'

    Meeting:
      type: object
      description: A meeting record returned by the server.
      required:
        - id
        - title
        - date
        - agenda_items
        - people
        - status
        - created_at
      properties:
        id:
          type: string
          format: uuid
          description: Unique meeting identifier (UUID)
          example: 3fa85f64-5717-4562-b3fc-2c963f66afa6
        title:
          type: string
          description: Meeting topic
          example: совещания по вопросам поддержки применения ИИ в науке
        date:
          type: string
          format: date-time
          description: Date and time of the meeting (UTC, ISO 8601)
          example: '2026-02-26T11:00:00Z'
        chairperson:
          description: Resolved chairperson object (null if not yet set)
          nullable: true
          allOf:
            - $ref: '#/components/schemas/Person'
        agenda_items:
          type: array
          description: Ordered agenda items with resolved speaker objects
          items:
            $ref: '#/components/schemas/AgendaItem'
        people:
          type: array
          description: >
            People in this meeting in their current display order
            (can be changed via PUT /meetings/{id}/people/order).
          items:
            $ref: '#/components/schemas/Person'
        status:
          type: string
          enum: [incomplete, complete]
          description: >
            incomplete — chairperson not set, or no people, or no agenda items.
            complete — all three are present.
          example: incomplete
        created_at:
          type: string
          format: date-time
          description: Timestamp when the record was created (UTC, ISO 8601)
          example: '2026-02-26T10:00:00Z'

    AgendaItemOrder:
      type: object
      description: >
        Payload for reordering agenda items within a meeting.
        Must contain exactly the same IDs already attached to the meeting.
      required:
        - agenda_item_ids
      properties:
        agenda_item_ids:
          type: array
          description: >
            All agenda item IDs of the meeting in the desired new order.
            Must be the same set as the current agenda items — no additions
            or removals, only reordering.
          minItems: 1
          items:
            type: integer
          example:
            - 3
            - 1
            - 2

    PersonOrder:
      type: object
      description: >
        Payload for reordering people within a meeting.
        Must contain exactly the same IDs already attached to the meeting.
      required:
        - person_ids
      properties:
        person_ids:
          type: array
          description: >
            All person IDs of the meeting in the desired new order.
            Must be the same set as the current people — no additions
            or removals, only reordering.
          minItems: 1
          items:
            type: integer
          example:
            - 17
            - 42

    MeetingUpdate:
      type: object
      description: >
        Payload for partially updating an existing meeting's title and/or date.
        Only fields present in the body are updated.
      properties:
        title:
          type: string
          description: New meeting title
          example: обновлённое название совещания
        date:
          type: string
          format: date-time
          description: New date and time of the meeting (UTC, ISO 8601)
          example: '2026-03-01T10:00:00Z'

    SetChairperson:
      type: object
      description: Payload for setting or replacing the meeting chairperson.
      required:
        - person_id
      properties:
        person_id:
          type: integer
          description: >
            ID of the person to set as chairperson.
            Must already be in the meeting's people list.
          example: 42

    AddMeetingPerson:
      type: object
      description: Payload for adding a person to an existing meeting.
      required:
        - person_id
      properties:
        person_id:
          type: integer
          description: ID of the person to add to the meeting
          example: 55

    AgendaItemUpsert:
      type: object
      description: >
        Payload for creating or fully replacing an agenda item.
        Used by both POST /meetings/{id}/agenda-items and PUT /meetings/{id}/agenda-items/{item_id}.
        All speakers are replaced atomically on PUT. At least one speaker is required.
      required:
        - text
        - speaker_ids
      properties:
        text:
          type: string
          description: Topic/title of the agenda item
          example: Об институте AIRI и видении применения ИИ в науке
        speaker_ids:
          type: array
          items:
            type: integer
          minItems: 1
          description: >
            IDs of the people presenting this item (докладчики).
            All IDs must already be in the meeting's people list.
          example: [17, 42]

    ErrorNotFound:
      type: object
      description: Resource not found error response.
      properties:
        message:
          type: string
          example: Not found

    ErrorConflict:
      type: object
      description: Conflict error — resource already exists or constraint violated.
      properties:
        message:
          type: string
          description: Human-readable error summary
          example: Person already exists
        details:
          type: object
          description: Optional structured details, e.g. ID of the existing record
          additionalProperties: true
          example:
            existing_id: 55

    Error422:
      type: object
      description: Unprocessable entity error — semantic validation failed.
      properties:
        message:
          type: string
          description: Human-readable error summary
          example: One or more person IDs not found
        details:
          type: object
          description: Optional structured details about what failed
          additionalProperties: true
          example:
            invalid_person_ids:
              - 99
              - 100

    ErrorUnprocessableEntity:
      $ref: '#/components/schemas/Error422'

    ErrorBadRequest:
      type: object
      description: Bad request — missing or malformed input.
      properties:
        message:
          type: string
          description: Human-readable error summary
          example: title and date are required