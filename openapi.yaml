openapi: 3.0.3

info:
  title: Meeting Bot API
  description: >
    REST API for the Meetings Editor Telegram Mini App.
    Provides participant lookup, meeting creation, and .docx export.
  version: 1.0.0

servers:
  - url: http://localhost:8080
    description: Local development

tags:
  - name: participants
    description: Participant management
  - name: meetings
    description: Meeting management and export

paths:
  /participants:
    get:
      tags:
        - participants
      summary: List or search participants
      description: >
        Without `q`: returns all participants ordered by last_name, first_name.

        With `q`: performs a word-by-word partial match search. The query is split
        on whitespace into words; every word must appear somewhere in the
        concatenated name string (case-insensitive). Backed by a PostgreSQL GIN
        trigram index (pg_trgm) — efficient up to ~100k rows. Returns up to 100
        results.
      parameters:
        - name: q
          in: query
          required: false
          description: >
            Optional search string. Split on whitespace; each word is matched
            as a substring of the full name. Example: "иван пет" matches
            "Иван Петров".
          schema:
            type: string
          example: Иванов Иван
      responses:
        '200':
          description: List of participants (all, or matching q)
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Participant'
              example:
                - id: 42
                  last_name: Иванов
                  first_name: Иван
                  middle_name: Иванович
                  info: Руководитель отдела
                - id: 43
                  last_name: Петров
                  first_name: Пётр
                  middle_name: null
                  info: null

    post:
      tags:
        - participants
      summary: Create a new participant
      description: >
        Adds a new participant to the database.
        Returns 409 Conflict if a participant with the same last_name,
        first_name, and middle_name already exists.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ParticipantCreate'
            example:
              last_name: Сидоров
              first_name: Алексей
              middle_name: Петрович
              info: Главный аналитик
      responses:
        '201':
          description: Participant created successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Participant'
              example:
                id: 99
                last_name: Сидоров
                first_name: Алексей
                middle_name: Петрович
                info: Главный аналитик
        '409':
          description: Participant with this name already exists
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorConflict'
              example:
                message: Participant already exists
                details:
                  existing_id: 55

  /participants/{id}:
    put:
      tags:
        - participants
      summary: Update a participant
      description: >
        Updates an existing participant's fields. All fields from ParticipantCreate
        may be changed. Returns 409 if the new name combination already belongs
        to a different participant.
      parameters:
        - name: id
          in: path
          required: true
          description: Participant ID to update
          schema:
            type: integer
          example: 42
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ParticipantCreate'
            example:
              last_name: Иванов
              first_name: Иван
              middle_name: Иванович
              info: Директор департамента
      responses:
        '200':
          description: Participant updated successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Participant'
        '404':
          description: Participant not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorNotFound'
        '409':
          description: Another participant with the same name already exists
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorConflict'

    delete:
      tags:
        - participants
      summary: Delete a participant
      description: >
        Permanently removes a participant from the database.
        Returns 409 if the participant is referenced in one or more existing meetings
        (FK constraint prevents deletion).
      parameters:
        - name: id
          in: path
          required: true
          description: Participant ID to delete
          schema:
            type: integer
          example: 42
      responses:
        '204':
          description: Participant deleted successfully
        '404':
          description: Participant not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorNotFound'
        '409':
          description: Participant is referenced in existing meetings and cannot be deleted
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorConflict'
              example:
                message: Participant is referenced in existing meetings

  /meetings:
    get:
      tags:
        - meetings
      summary: Get all meetings
      description: >
        Returns a paginated list of all meetings from the database,
        ordered by date descending (newest first).
      parameters:
        - name: limit
          in: query
          required: false
          description: Maximum number of meetings to return (default 20, max 100)
          schema:
            type: integer
            minimum: 1
            maximum: 100
            default: 20
          example: 20
        - name: offset
          in: query
          required: false
          description: Number of meetings to skip for pagination
          schema:
            type: integer
            minimum: 0
            default: 0
          example: 0
      responses:
        '200':
          description: List of meetings
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MeetingList'
              example:
                total: 42
                limit: 20
                offset: 0
                items:
                  - id: 3fa85f64-5717-4562-b3fc-2c963f66afa6
                    title: совещания по вопросам поддержки применения ИИ в науке
                    date: '2026-02-26T11:00:00Z'
                    chairperson:
                      id: 42
                      last_name: Иванов
                      first_name: Иван
                      middle_name: Иванович
                      info: Заместитель руководителя Секретариата
                    created_at: '2026-02-26T10:00:00Z'

    post:
      tags:
        - meetings
      summary: Create a meeting
      description: >
        Creates a new meeting record in one step ("Зафиксировать").
        The frontend sends the accumulated data: title, date, chairperson,
        agenda items with speakers, and the IDs of all participants.
        If any participant_id, speaker_id, or chairperson_id does not exist
        in the database, the server returns 422 Unprocessable Entity.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/MeetingCreate'
            example:
              title: совещания по вопросам поддержки применения ИИ в науке
              date: '2026-02-26T11:00:00Z'
              chairperson_id: 42
              agenda_items:
                - text: Вступительное слово
                  speaker_id: 42
                - text: Об институте AIRI и видении применения ИИ в науке
                  speaker_id: 17
              participant_ids:
                - 42
                - 17
      responses:
        '201':
          description: Meeting created successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Meeting'
              example:
                id: 3fa85f64-5717-4562-b3fc-2c963f66afa6
                title: совещания по вопросам поддержки применения ИИ в науке
                date: '2026-02-26T11:00:00Z'
                chairperson:
                  id: 42
                  last_name: Иванов
                  first_name: Иван
                  middle_name: Иванович
                  info: Заместитель руководителя Секретариата
                agenda_items:
                  - text: Вступительное слово
                    speaker:
                      id: 42
                      last_name: Иванов
                      first_name: Иван
                      middle_name: Иванович
                      info: Заместитель руководителя Секретариата
                  - text: Об институте AIRI и видении применения ИИ в науке
                    speaker:
                      id: 17
                      last_name: Петрова
                      first_name: Мария
                      middle_name: Сергеевна
                      info: Ведущий инженер
                participants:
                  - id: 42
                    last_name: Иванов
                    first_name: Иван
                    middle_name: Иванович
                    info: Заместитель руководителя Секретариата
                  - id: 17
                    last_name: Петрова
                    first_name: Мария
                    middle_name: Сергеевна
                    info: Ведущий инженер
                created_at: '2026-02-26T10:00:00Z'
        '422':
          description: >
            Validation error — one or more participant_ids, speaker_ids,
            or chairperson_id do not exist in the database.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error422'
              example:
                message: One or more participants not found
                details:
                  invalid_participant_ids:
                    - 99
                    - 100

  /meetings/{id}:
    get:
      tags:
        - meetings
      summary: Get meeting by ID
      description: >
        Returns the full meeting record for the specified UUID,
        including resolved chairperson, agenda items with speakers,
        and the complete participant list.
      parameters:
        - name: id
          in: path
          required: true
          description: UUID of the meeting
          schema:
            type: string
            format: uuid
          example: 3fa85f64-5717-4562-b3fc-2c963f66afa6
      responses:
        '200':
          description: Meeting found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Meeting'
              example:
                id: 3fa85f64-5717-4562-b3fc-2c963f66afa6
                title: совещания по вопросам поддержки применения ИИ в науке
                date: '2026-02-26T11:00:00Z'
                chairperson:
                  id: 42
                  last_name: Иванов
                  first_name: Иван
                  middle_name: Иванович
                  info: Заместитель руководителя Секретариата
                agenda_items:
                  - text: Вступительное слово
                    speaker:
                      id: 42
                      last_name: Иванов
                      first_name: Иван
                      middle_name: Иванович
                      info: Заместитель руководителя Секретариата
                participants:
                  - id: 42
                    last_name: Иванов
                    first_name: Иван
                    middle_name: Иванович
                    info: Заместитель руководителя Секретариата
                  - id: 17
                    last_name: Петрова
                    first_name: Мария
                    middle_name: Сергеевна
                    info: Ведущий инженер
                created_at: '2026-02-26T10:00:00Z'
        '404':
          description: Meeting not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorNotFound'

    put:
      tags:
        - meetings
      summary: Update meeting title, date, or chairperson
      description: >
        Updates the title, date, and/or chairperson of an existing meeting.
        The new chairperson_id must already be a participant of this meeting
        (returns 422 otherwise). Returns the full updated Meeting object.
      parameters:
        - name: id
          in: path
          required: true
          description: UUID of the meeting
          schema:
            type: string
            format: uuid
          example: 3fa85f64-5717-4562-b3fc-2c963f66afa6
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/MeetingUpdate'
            example:
              title: обновлённое название совещания
              date: '2026-03-01T10:00:00Z'
              chairperson_id: 17
      responses:
        '200':
          description: Meeting updated successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Meeting'
        '404':
          description: Meeting not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorNotFound'
        '422':
          description: >
            chairperson_id is not a participant of this meeting,
            or one of the referenced IDs does not exist.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error422'
              example:
                message: chairperson must be a participant of the meeting

    delete:
      tags:
        - meetings
      summary: Delete a meeting
      description: >
        Permanently deletes the meeting and all associated agenda items and
        meeting_participants records (cascade). This action is irreversible.
      parameters:
        - name: id
          in: path
          required: true
          description: UUID of the meeting to delete
          schema:
            type: string
            format: uuid
          example: 3fa85f64-5717-4562-b3fc-2c963f66afa6
      responses:
        '204':
          description: Meeting deleted successfully
        '404':
          description: Meeting not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorNotFound'

  /meetings/{id}/participants:
    post:
      tags:
        - meetings
      summary: Add a participant to an existing meeting
      description: >
        Adds an existing participant (by ID) to the specified meeting's
        participant list. The participant is appended to the end of the list.
        Returns 409 if the participant is already in the meeting.
        Returns 422 if the participant ID does not exist in the database.
        Returns the full updated Meeting object.
      parameters:
        - name: id
          in: path
          required: true
          description: UUID of the meeting
          schema:
            type: string
            format: uuid
          example: 3fa85f64-5717-4562-b3fc-2c963f66afa6
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AddMeetingParticipant'
            example:
              participant_id: 55
      responses:
        '200':
          description: Participant added; returns updated meeting
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Meeting'
        '404':
          description: Meeting not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorNotFound'
        '409':
          description: Participant is already in this meeting
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorConflict'
              example:
                message: participant already in meeting
        '422':
          description: Participant ID does not exist in the database
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error422'
              example:
                message: participant not found

  /meetings/{id}/participants/{pid}:
    delete:
      tags:
        - meetings
      summary: Remove a participant from a meeting
      description: >
        Removes a participant from the specified meeting's participant list.
        Returns 409 if the participant is the meeting's chairperson (change
        chairperson first via PUT /meetings/{id}) or if the participant is
        a speaker on any agenda item of this meeting (remove or reassign the
        agenda item first).
        Returns the full updated Meeting object on success.
      parameters:
        - name: id
          in: path
          required: true
          description: UUID of the meeting
          schema:
            type: string
            format: uuid
          example: 3fa85f64-5717-4562-b3fc-2c963f66afa6
        - name: pid
          in: path
          required: true
          description: Participant ID to remove from the meeting
          schema:
            type: integer
          example: 55
      responses:
        '200':
          description: Participant removed; returns updated meeting
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Meeting'
        '404':
          description: Meeting or participant not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorNotFound'
        '409':
          description: >
            Cannot remove participant — they are the chairperson or a speaker
            on an agenda item.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorConflict'
              example:
                message: cannot remove chairperson from meeting

  /meetings/{id}/participants/order:
    put:
      tags:
        - meetings
      summary: Reorder participants within a meeting
      description: >
        Replaces the display order of participants for the specified meeting.
        The request body must contain exactly the same set of participant IDs
        already attached to the meeting — only their order changes.
        The new order is persisted and reflected in subsequent GET /meetings/{id}
        responses and in the Список участников export.
        Returns 422 if the provided IDs do not exactly match the meeting's
        current participant set (wrong count or unknown ID).
      parameters:
        - name: id
          in: path
          required: true
          description: UUID of the meeting
          schema:
            type: string
            format: uuid
          example: 3fa85f64-5717-4562-b3fc-2c963f66afa6
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ParticipantOrder'
            example:
              participant_ids:
                - 17
                - 42
      responses:
        '204':
          description: Order updated successfully
        '404':
          description: Meeting not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorNotFound'
        '422':
          description: >
            Provided participant_ids do not exactly match the meeting's
            current participants (wrong count or unknown ID).
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error422'
              example:
                message: participant IDs must exactly match the meeting's current participants

  /meetings/{id}/agenda:
    post:
      tags:
        - meetings
      summary: Add an agenda item to an existing meeting
      description: >
        Appends a new agenda item to the meeting. The speaker_id must
        already be a participant of this meeting (returns 422 otherwise).
        Returns the full updated Meeting object.
      parameters:
        - name: id
          in: path
          required: true
          description: UUID of the meeting
          schema:
            type: string
            format: uuid
          example: 3fa85f64-5717-4562-b3fc-2c963f66afa6
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AgendaItemUpsert'
            example:
              text: Новый пункт повестки
              speaker_id: 42
      responses:
        '200':
          description: Agenda item added; returns updated meeting
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Meeting'
        '404':
          description: Meeting not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorNotFound'
        '422':
          description: speaker_id is not a participant of this meeting
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error422'
              example:
                message: speaker must be a participant of the meeting

  /meetings/{id}/agenda/{item_id}:
    put:
      tags:
        - meetings
      summary: Update an agenda item
      description: >
        Updates the text and/or speaker of the specified agenda item.
        The new speaker_id must already be a participant of this meeting
        (returns 422 otherwise). Returns the full updated Meeting object.
      parameters:
        - name: id
          in: path
          required: true
          description: UUID of the meeting
          schema:
            type: string
            format: uuid
          example: 3fa85f64-5717-4562-b3fc-2c963f66afa6
        - name: item_id
          in: path
          required: true
          description: ID of the agenda item to update
          schema:
            type: integer
          example: 3
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AgendaItemUpsert'
            example:
              text: Обновлённый текст пункта
              speaker_id: 17
      responses:
        '200':
          description: Agenda item updated; returns updated meeting
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Meeting'
        '404':
          description: Meeting or agenda item not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorNotFound'
        '422':
          description: speaker_id is not a participant of this meeting
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error422'
              example:
                message: speaker must be a participant of the meeting

    delete:
      tags:
        - meetings
      summary: Delete an agenda item
      description: >
        Removes the specified agenda item from the meeting.
        Returns the full updated Meeting object.
      parameters:
        - name: id
          in: path
          required: true
          description: UUID of the meeting
          schema:
            type: string
            format: uuid
          example: 3fa85f64-5717-4562-b3fc-2c963f66afa6
        - name: item_id
          in: path
          required: true
          description: ID of the agenda item to delete
          schema:
            type: integer
          example: 3
      responses:
        '200':
          description: Agenda item deleted; returns updated meeting
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Meeting'
        '404':
          description: Meeting or agenda item not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorNotFound'

  /meetings/{id}/agenda/order:
    put:
      tags:
        - meetings
      summary: Reorder agenda items within a meeting
      description: >
        Replaces the display order of agenda items for the specified meeting.
        The request body must contain exactly the same set of agenda item IDs
        already attached to the meeting — only their order changes.
        The new order is persisted and reflected in subsequent GET /meetings/{id}
        responses and in the Повестка export.
        Returns 422 if the provided IDs do not exactly match the meeting's
        current agenda items (wrong count or unknown ID).
      parameters:
        - name: id
          in: path
          required: true
          description: UUID of the meeting
          schema:
            type: string
            format: uuid
          example: 3fa85f64-5717-4562-b3fc-2c963f66afa6
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AgendaItemOrder'
            example:
              agenda_item_ids:
                - 3
                - 1
                - 2
      responses:
        '204':
          description: Order updated successfully
        '404':
          description: Meeting not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorNotFound'
        '422':
          description: >
            Provided agenda_item_ids do not exactly match the meeting's
            current agenda items (wrong count or unknown ID).
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error422'
              example:
                message: agenda item IDs must exactly match the meeting's current agenda items

  /meetings/{id}/export/agenda:
    get:
      tags:
        - meetings
      summary: Export meeting agenda as DOCX (Повестка)
      description: >
        Generates and returns a .docx "Повестка" document for the specified
        meeting. The document mirrors the official template layout:
        - Header block: "ПОВЕСТКА / [title]" centred, followed by the
          chairperson line and meeting date/time aligned right
        - Numbered agenda items (roman numerals I, II, III…), each followed
          by a "Докладчик:" label and a two-column table row containing the
          speaker's LAST NAME / First Name Patronymic in the left cell and
          their info/role in the right cell
      parameters:
        - name: id
          in: path
          required: true
          description: UUID of the meeting to export
          schema:
            type: string
            format: uuid
          example: 3fa85f64-5717-4562-b3fc-2c963f66afa6
      responses:
        '200':
          description: DOCX agenda file
          headers:
            Content-Disposition:
              description: >
                Attachment filename, e.g.
                attachment; filename="agenda-3fa85f64.docx"
              schema:
                type: string
          content:
            application/vnd.openxmlformats-officedocument.wordprocessingml.document:
              schema:
                type: string
                format: binary
        '404':
          description: Meeting not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorNotFound'

  /meetings/{id}/export/participants:
    get:
      tags:
        - meetings
      summary: Export participant list as DOCX (Список участников)
      description: >
        Generates and returns a .docx "Список участников" document for the
        specified meeting. The document mirrors the official template layout:
        - Header block: "СПИСОК / участников [title]" centred, followed by
          the chairperson line and meeting date/time aligned right
        - A single table with all participants in numbered rows; each row
          contains the sequential number, the participant's LAST NAME /
          First Name Patronymic, a dash separator, and their info/role
      parameters:
        - name: id
          in: path
          required: true
          description: UUID of the meeting to export
          schema:
            type: string
            format: uuid
          example: 3fa85f64-5717-4562-b3fc-2c963f66afa6
      responses:
        '200':
          description: DOCX participants list file
          headers:
            Content-Disposition:
              description: >
                Attachment filename, e.g.
                attachment; filename="participants-3fa85f64.docx"
              schema:
                type: string
          content:
            application/vnd.openxmlformats-officedocument.wordprocessingml.document:
              schema:
                type: string
                format: binary
        '404':
          description: Meeting not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorNotFound'

components:
  schemas:

    MeetingSummary:
      type: object
      description: >
        Lightweight meeting record returned in list responses.
        Contains only the fields needed for displaying a meeting in a list —
        full details (agenda_items, participants) are fetched via GET /meetings/{id}.
      required:
        - id
        - title
        - date
        - chairperson
        - created_at
      properties:
        id:
          type: string
          format: uuid
          example: 3fa85f64-5717-4562-b3fc-2c963f66afa6
        title:
          type: string
          example: совещания по вопросам поддержки применения ИИ в науке
        date:
          type: string
          format: date-time
          example: '2026-02-26T11:00:00Z'
        chairperson:
          description: Resolved chairperson object
          allOf:
            - $ref: '#/components/schemas/Participant'
        created_at:
          type: string
          format: date-time
          example: '2026-02-26T10:00:00Z'

    MeetingList:
      type: object
      description: Paginated list of meetings.
      required:
        - total
        - limit
        - offset
        - items
      properties:
        total:
          type: integer
          description: Total number of meetings in the database (for pagination)
          example: 42
        limit:
          type: integer
          example: 20
        offset:
          type: integer
          example: 0
        items:
          type: array
          items:
            $ref: '#/components/schemas/MeetingSummary'

    Participant:
      type: object
      description: A person who can be added to a meeting.
      required:
        - id
        - last_name
        - first_name
      properties:
        id:
          type: integer
          description: Unique participant identifier
          example: 42
        last_name:
          type: string
          description: Last name (фамилия) — displayed in CAPS in documents
          example: Иванов
        first_name:
          type: string
          description: First name (имя)
          example: Иван
        middle_name:
          type: string
          description: Middle name / patronymic (отчество), optional
          example: Иванович
        info:
          type: string
          description: >
            Role/position displayed in exported documents
            (right column in Повестка and Список участников)
          example: Руководитель отдела

    ParticipantCreate:
      type: object
      description: Payload for creating a new participant.
      required:
        - last_name
        - first_name
      properties:
        last_name:
          type: string
          description: Last name (фамилия)
          example: Сидоров
        first_name:
          type: string
          description: First name (имя)
          example: Алексей
        middle_name:
          type: string
          description: Middle name / patronymic (отчество), optional
          example: Петрович
        info:
          type: string
          description: Role/position info
          example: Главный аналитик

    AgendaItemCreate:
      type: object
      description: >
        A single agenda item submitted when creating a meeting.
        Each item has its own speaker (докладчик), who must be present
        in participant_ids.
      required:
        - text
        - speaker_id
      properties:
        text:
          type: string
          description: >
            Topic/title of the agenda item as it will appear
            in the Повестка document
          example: Об институте AIRI и видении применения ИИ в науке
        speaker_id:
          type: integer
          description: >
            ID of the participant presenting this item (докладчик).
            Must also appear in participant_ids.
          example: 17

    AgendaItem:
      type: object
      description: >
        An agenda item with its speaker fully resolved.
        The id field is used when reordering via PUT /meetings/{id}/agenda/order.
      required:
        - id
        - text
        - speaker
      properties:
        id:
          type: integer
          description: Unique agenda item identifier
          example: 1
        text:
          type: string
          example: Об институте AIRI и видении применения ИИ в науке
        speaker:
          $ref: '#/components/schemas/Participant'

    MeetingCreate:
      type: object
      description: Payload for creating a new meeting.
      required:
        - title
        - date
        - chairperson_id
        - agenda_items
        - participant_ids
      properties:
        title:
          type: string
          description: >
            Meeting topic, placed after "ПОВЕСТКА / СПИСОК участников"
            in the document header
          example: совещания по вопросам поддержки применения ИИ в науке
        date:
          type: string
          format: date-time
          description: >
            Date and time of the meeting (UTC, ISO 8601).
            Rendered as a localised date/time string in document headers.
          example: '2026-02-26T11:00:00Z'
        chairperson_id:
          type: integer
          description: >
            ID of the person chairing the meeting (председательствующий).
            Their name and role appear in the header of both exported documents.
            Must also be present in participant_ids.
          example: 42
        agenda_items:
          type: array
          description: Ordered list of agenda points, each with a speaker
          minItems: 1
          items:
            $ref: '#/components/schemas/AgendaItemCreate'
        participant_ids:
          type: array
          description: >
            IDs of all participants listed in the Список участников.
            Must include chairperson_id and all speaker_ids from agenda_items.
            Each ID must exist in the database.
          minItems: 1
          items:
            type: integer
          example:
            - 42
            - 17

    Meeting:
      type: object
      description: A fully created meeting record returned by the server.
      required:
        - id
        - title
        - date
        - chairperson
        - agenda_items
        - participants
        - created_at
      properties:
        id:
          type: string
          format: uuid
          description: Unique meeting identifier (UUID)
          example: 3fa85f64-5717-4562-b3fc-2c963f66afa6
        title:
          type: string
          description: Meeting topic
          example: совещания по вопросам поддержки применения ИИ в науке
        date:
          type: string
          format: date-time
          description: Date and time of the meeting (UTC, ISO 8601)
          example: '2026-02-26T11:00:00Z'
        chairperson:
          description: Resolved chairperson object
          allOf:
            - $ref: '#/components/schemas/Participant'
        agenda_items:
          type: array
          description: Ordered agenda items with resolved speaker objects
          items:
            $ref: '#/components/schemas/AgendaItem'
        participants:
          type: array
          description: >
            Full participant objects for the Список участников,
            in their current display order (can be changed via
            PUT /meetings/{id}/participants/order).
          items:
            $ref: '#/components/schemas/Participant'
        created_at:
          type: string
          format: date-time
          description: Timestamp when the record was created (UTC, ISO 8601)
          example: '2026-02-26T10:00:00Z'

    AgendaItemOrder:
      type: object
      description: >
        Payload for reordering agenda items within a meeting.
        Must contain exactly the same IDs already attached to the meeting.
      required:
        - agenda_item_ids
      properties:
        agenda_item_ids:
          type: array
          description: >
            All agenda item IDs of the meeting in the desired new order.
            Must be the same set as the current agenda items — no additions
            or removals, only reordering.
          minItems: 1
          items:
            type: integer
          example:
            - 3
            - 1
            - 2

    ParticipantOrder:
      type: object
      description: >
        Payload for reordering participants within a meeting.
        Must contain exactly the same IDs already attached to the meeting.
      required:
        - participant_ids
      properties:
        participant_ids:
          type: array
          description: >
            All participant IDs of the meeting in the desired new order.
            Must be the same set as the current participants — no additions
            or removals, only reordering.
          minItems: 1
          items:
            type: integer
          example:
            - 17
            - 42

    MeetingUpdate:
      type: object
      description: >
        Payload for updating an existing meeting's title, date, and/or chairperson.
        All fields are required — send the full desired state.
      required:
        - title
        - date
        - chairperson_id
      properties:
        title:
          type: string
          description: New meeting title
          example: обновлённое название совещания
        date:
          type: string
          format: date-time
          description: New date and time of the meeting (UTC, ISO 8601)
          example: '2026-03-01T10:00:00Z'
        chairperson_id:
          type: integer
          description: >
            ID of the new chairperson. Must already be a participant of this meeting.
          example: 17

    AddMeetingParticipant:
      type: object
      description: Payload for adding a participant to an existing meeting.
      required:
        - participant_id
      properties:
        participant_id:
          type: integer
          description: ID of the participant to add to the meeting
          example: 55

    AgendaItemUpsert:
      type: object
      description: >
        Payload for creating or updating an agenda item.
        Used by both POST /meetings/{id}/agenda and PUT /meetings/{id}/agenda/{item_id}.
      required:
        - text
        - speaker_id
      properties:
        text:
          type: string
          description: Topic/title of the agenda item
          example: Об институте AIRI и видении применения ИИ в науке
        speaker_id:
          type: integer
          description: >
            ID of the participant presenting this item (докладчик).
            Must already be a participant of this meeting.
          example: 42

    ErrorNotFound:
      type: object
      description: Resource not found error response.
      properties:
        message:
          type: string
          example: Not found

    ErrorConflict:
      type: object
      description: Conflict error — resource already exists.
      properties:
        message:
          type: string
          description: Human-readable error summary
          example: Participant already exists
        details:
          type: object
          description: Optional structured details, e.g. ID of the existing record
          additionalProperties: true
          example:
            existing_id: 55

    Error422:
      type: object
      description: Unprocessable entity error — semantic validation failed.
      properties:
        message:
          type: string
          description: Human-readable error summary
          example: One or more participants not found
        details:
          type: object
          description: Optional structured details about what failed
          additionalProperties: true
          example:
            invalid_participant_ids:
              - 99
              - 100