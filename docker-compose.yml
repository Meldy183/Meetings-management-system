services:

  # 1. PostgreSQL database
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: meetings_editor
      POSTGRES_USER: meetings
      POSTGRES_PASSWORD: meetings
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U meetings -d meetings_editor"]
      interval: 5s
      timeout: 5s
      retries: 10

  # 2. Database migrations (runs once, then exits)
  migrate:
    image: migrate/migrate:v4.18.1
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - ./backend/migrations:/migrations
    command:
      - "-path=/migrations"
      - "-database=postgres://meetings:meetings@db:5432/meetings_editor?sslmode=disable"
      - "up"
    restart: on-failure

  # 3. Go backend (internal only — nginx proxies to it)
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    depends_on:
      db:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
    environment:
      DATABASE_URL: postgres://meetings:meetings@db:5432/meetings_editor?sslmode=disable
      PORT: 8080
      ENV: prod

  # 4. React frontend (nginx)
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    depends_on:
      - backend
    ports:
      - "80:80"

volumes:
  postgres_data:
