services:

  # 1. PostgreSQL database
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: meetings_editor
      POSTGRES_USER: meetings
      POSTGRES_PASSWORD: meetings
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./postgres-initdb:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U meetings -d meetings_editor"]
      interval: 5s
      timeout: 5s
      retries: 10

  # 2. Database migrations — production DB (runs once, then exits)
  migrate:
    image: migrate/migrate:v4.18.1
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - ./backend/migrations:/migrations
    command:
      - "-path=/migrations"
      - "-database=postgres://meetings:meetings@db:5432/meetings_editor?sslmode=disable"
      - "up"
    restart: on-failure

  # 2b. Database migrations — test DB (only with --profile test)
  migrate-test:
    profiles: [test]
    image: migrate/migrate:v4.18.1
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - ./backend/migrations:/migrations
    command:
      - "-path=/migrations"
      - "-database=postgres://meetings:meetings@db:5432/meetings_editor_test?sslmode=disable"
      - "up"
    restart: on-failure

  # 2c. Run the full Go test suite against the test DB (only with --profile test)
  run-tests:
    profiles: [test]
    build:
      context: ./backend
      dockerfile: Dockerfile
      target: test
    depends_on:
      db:
        condition: service_healthy
      migrate-test:
        condition: service_completed_successfully
    environment:
      TEST_DATABASE_URL: postgres://meetings:meetings@db:5432/meetings_editor_test?sslmode=disable

  # 3. Go backend (internal only — nginx proxies to it)
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    depends_on:
      db:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
      run-tests:
        condition: service_completed_successfully
        required: false
    environment:
      DATABASE_URL: postgres://meetings:meetings@db:5432/meetings_editor?sslmode=disable
      PORT: 8080
      ENV: prod
      # Auth — override these in production via a .env file or CI secrets
      ADMIN_PASSWORD: ${ADMIN_PASSWORD:-admin}
      API_KEY: ${API_KEY:-admin}

  # 4. Console REPL — interactive client (run with: docker compose run --rm console)
  console:
    profiles: [console]
    build:
      context: ./console
      dockerfile: Dockerfile
    depends_on:
      - backend
    environment:
      MEETING_API_BASE_URL: http://backend:8080
      MEETING_API_TOKEN: ${API_KEY:-admin}
    stdin_open: true
    tty: true

  # 5. React frontend (nginx)
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    depends_on:
      - backend
    ports:
      - "8081:80"

volumes:
  postgres_data:
